version: '3.8'

services:
  nginx-gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - svc-catalogo
      - svc-prestamos
      - svc-miembros
    networks:
      - microservices-net

  #Contenedor del microservicio de catalogos
  svc-catalogo:
    build: ./svc-catalogo
    ports:
      - "8091:8091"
    environment:
      - REDIS_HOST=redis-cache
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=12345
    depends_on:
      - redis-cache
      - postgres
    networks:
      - microservices-net

  #Contenedor del microservicio de prestamos
  svc-prestamos:
    build: ./svc-prestamos
    ports:
      - "8092:8092"
    environment:
      - REDIS_HOST=redis-cache
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=12345
    depends_on:
      - redis-cache
      - postgres
    networks:
      - microservices-net

  #Contenedor del microservicio de miembros
  svc-miembros:
    build: ./svc-miembros
    ports:
      - "8093:8093"
    environment:
      - REDIS_HOST=redis-cache
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=12345
    depends_on:
      - redis-cache
      - postgres
    networks:
      - microservices-net

  #Contenedor de redis
  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - microservices-net

  #Contenedor de postgres
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-net

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres_data: